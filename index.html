<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kotkotenok45 | Projects</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 900px;
            padding: 40px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        h1 { font-size: 24px; font-weight: 600; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 900px;
        }

        .repo-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            transition: border-color 0.2s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .repo-card:hover {
            border-color: var(--text-muted);
        }

        .repo-name {
            color: var(--accent);
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .repo-desc {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .repo-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        #loader { color: var(--text-muted); padding: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>kotkotenok45 / Projects</h1>
    </header>

    <div id="loader">Загрузка репозиториев...</div>
    <div class="grid" id="repo-grid"></div>

    <script>
        const username = 'kotkotenok45';
        const grid = document.getElementById('repo-grid');
        const loader = document.getElementById('loader');

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
                const repos = await response.json();
                
                loader.style.display = 'none';

                repos.forEach(repo => {
                    // Пропускаем сам репозиторий страницы, если хочешь
                    if (repo.name.toLowerCase() === `${username}.github.io`.toLowerCase()) return;

                    const card = document.createElement('a');
                    card.className = 'repo-card';
                    card.href = repo.html_url;
                    card.target = '_blank';

                    card.innerHTML = `
                        <div>
                            <div class="repo-name">${repo.name}</div>
                            <div class="repo-desc">${repo.description || 'Нет описания'}</div>
                        </div>
                        <div class="repo-meta">
                            <span>● ${repo.language || 'Code'}</span>
                            <span>⭐ ${repo.stargazers_count}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                loader.innerText = 'Ошибка при загрузке данных.';
                console.error(error);
            }
        }

        fetchRepos();
    </script>
</body>
</html>
