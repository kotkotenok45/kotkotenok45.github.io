<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kotkotenok45 | Hub</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --tab-active: #f78166;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1000px;
            padding: 20px 0;
            text-align: center;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            width: 100%;
            max-width: 1000px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: var(--text-main);
            border-bottom-color: var(--tab-active);
        }

        .tab-btn:hover { color: var(--text-main); }

        .grid {
            display: none; /* Скрыты по умолчанию */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 1000px;
        }

        .grid.active { display: grid; }

        .repo-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.2s;
        }

        .repo-card:hover { border-color: var(--text-muted); background: #1c2128; }

        .repo-name { color: var(--accent); font-weight: 600; margin-bottom: 8px; }
        .repo-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 15px; flex-grow: 1; }
        
        .repo-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .btn-visit {
            font-size: 12px;
            color: var(--tab-active);
            text-decoration: underline;
        }

        #loader { padding: 50px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <h1>kotkotenok45</h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('repos')">Репозитории</button>
        <button class="tab-btn" onclick="showTab('pages')">Pages (Демо)</button>
    </div>

    <div id="loader">Загрузка данных из GitHub...</div>

    <div id="repos" class="grid active"></div>
    <div id="pages" class="grid"></div>

    <script>
        const username = 'kotkotenok45';

        async function loadContent() {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`);
                const repos = await response.json();
                
                document.getElementById('loader').style.display = 'none';

                const reposContainer = document.getElementById('repos');
                const pagesContainer = document.getElementById('pages');

                repos.forEach(repo => {
                    // Игнорируем сам репозиторий главной страницы
                    if (repo.name.toLowerCase() === `${username}.github.io`.toLowerCase()) return;

                    const cardHTML = `
                        <a href="${repo.html_url}" target="_blank" class="repo-card">
                            <div>
                                <div class="repo-name">${repo.name}</div>
                                <div class="repo-desc">${repo.description || 'Без описания'}</div>
                            </div>
                            <div class="repo-meta">
                                <span>● ${repo.language || 'Code'}</span>
                                ${repo.has_pages ? `<span class="btn-visit">Посмотреть сайт →</span>` : ''}
                            </div>
                        </a>
                    `;

                    // Всегда добавляем в общий список репозиториев
                    reposContainer.insertAdjacentHTML('beforeend', cardHTML);

                    // Если есть Pages, добавляем во вторую вкладку
                    if (repo.has_pages) {
                        const pageUrl = `https://${username}.github.io/${repo.name}/`;
                        const pageCardHTML = `
                            <a href="${pageUrl}" target="_blank" class="repo-card">
                                <div>
                                    <div class="repo-name">${repo.name}</div>
                                    <div class="repo-desc">${repo.description || 'Демонстрация проекта'}</div>
                                </div>
                                <div class="repo-meta">
                                    <span>🌐 Live Demo</span>
                                    <span class="btn-visit">Открыть →</span>
                                </div>
                            </a>
                        `;
                        pagesContainer.insertAdjacentHTML('beforeend', pageCardHTML);
                    }
                });

                if (pagesContainer.children.length === 0) {
                    pagesContainer.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:gray;">Пока нет проектов с GitHub Pages</p>';
                }

            } catch (e) {
                document.getElementById('loader').innerText = 'Ошибка загрузки.';
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.grid').forEach(g => g.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        loadContent();
    </script>
</body>
</html>
